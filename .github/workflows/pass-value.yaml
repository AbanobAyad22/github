name: Pass Output Example

on:
  push:
    branches: [ "master" ]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: cat file
        id: cat
        shell: bash
        run: |
          content=$(cat Dockerfile | tr '\n' ' ')
          echo "words=$content" >> $GITHUB_OUTPUT

      - name: Use file output
        run: | 
          echo "cat are: ${{ steps.cat.outputs.words }}"
