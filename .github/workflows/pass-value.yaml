name: Pass Output Example

on:
  workflow_dispatch:
    inputs:
      GREETING:
        description: "Greeting message"
        default: "welcome ya 3am"
        required: true
jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
# -------------------------

      - name: Show vars
        run: | 
           echo "Greeting is: ${{ inputs.GREETING }}"           