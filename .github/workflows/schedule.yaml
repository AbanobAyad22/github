name: delete user 

on:
   push:
    branches: ["master"]
    
jobs:    
  say-hello:
    runs-on: ubuntu-latest
    steps:
        - name: checkout
          uses: actions/checkout@v6
        - name: print
          id: num 
          run: |
            num=5
            value=$(cat note.txt | tr '\n' ' ')
            echo "NUMBER=$num"  >> $GITHUB_OUTPUT
            echo "val=$value"  >> $GITHUB_OUTPUT

        - name: print previous step value
          run: |
            echo ${{ steps.num.outputs.NUMBER }}
            echo ${{ steps.num.outputs.val }}

