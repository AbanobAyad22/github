name: pass output 

on: 
    push:
        branches: ["master"]

jobs: 
    demo:
        runs-on: ubuntu-latest
        steps: 
        - name: git clone  repo
          uses: actions/checkout@v6         

        - name:   list all
          run: |
             ls -l
        - name:   cat file
          run: |
             cat hello

        - name:   cat file
          id: hello
          run: |
             content=$(cat hello  | tr '\n'  ' ')
             number='2'
             echo "contents=$content"  >> $GITHUB_OUTPUT
             echo "number=$number" >> $GITHUB_OUTPUT

        - name: use file output
          run: |
             echo "the content of file is: ${{ steps.hello.outputs.contents }}" 
             echo "the the number  is: ${{ steps.hello.outputs.number }}"
        
        - name: condition
          if: ${{ steps.hello.outputs.number == '2' }}
          run: |
            echo "passed"

# -------------------------
        - name: pass env
          run: |
             echo "greeting='Hello'"  >> $GITHUB_ENV


        - name: show env
          run: |
             echo "Greeting =  ${{ env.greeting }} "     

# -------------------
        - name:  pass vars in repo variable  
          run: | 
              echo "name is: ${{ vars.name }} " 

            

