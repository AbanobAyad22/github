name: CICD pipeline

on: 
    push:
        branches: ["master"]


jobs:
    build: 
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v6
             
            - name: autenticate to docker hub
              uses: docker/login-action@v2  
              with:
                username: ${{secrets.DOCKER_USERNAME}}
                password: ${{secrets.DOCKER_PASSWORD}}