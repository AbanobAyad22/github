name: CICD pipeline

on: 
    push:
        branches: ["master"]


jobs:
    build: 
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v6
             
            - name: autenticate to docker hub
              uses: docker/login-action@v2  
              with:
                username: ${{secrets.DOCKER_USERNAME}}
                password: ${{secrets.DOCKER_PASSWORD}}

            - name: build and push
              uses: docker/build-push-action@v2    
              with:
                context: ./app/
                push: true
                tags: abanobayad/mycicdapp

    apply:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: checkout
              uses: actions/checkout@v6
              
            - name: authenticate and copy file
              uses: appleboy/scp-action@v0.1.7
              with:
                    host: "${{ secrets.HOST }}"
                    username: ${{ secrets.USERNAME }}
                    key: ${{ secrets.PRIVATEKEY }}
                    source: "kubernetes/*"
                    target: "~/app"

            - name: apply to kubernetes
              uses: appleboy/ssh-action@v0.1.7
              with: 
                    host: "${{ secrets.HOST }}"
                    username: ${{ secrets.USERNAME }}
                    key: ${{ secrets.PRIVATEKEY }}    
                    script: 
                        # kubectl delete -f ~/app/kubernetes/deployment.yaml
                        kubectl apply -f ~/app/kubernetes/deployment.yaml
                        kubectl apply -f ~/app/kubernetes/svc.yaml               
