name: dockerize and push and apply


on:
  push:
    branches: ['master']

jobs:
    build: 
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v6
              
            - name: log into docker file
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}     



            - name: build and push
              uses: docker/build-push-action@v4
              with:
                context: .
                push: true
                tags: abanobayad/cicd:latest
              